<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" role="img" aria-label="Dashboard background pattern">
  <title>Dashboard Background</title>
  <defs>
    <linearGradient id="dashBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Base fill -->
  <rect width="1440" height="900" fill="url(#dashBg)"/>

  <!-- Subtle grid lines - vertical -->
  <g stroke="#00b4b4" stroke-width="0.5" opacity="0.08">
    <line x1="120"  y1="0" x2="120"  y2="900"/>
    <line x1="240"  y1="0" x2="240"  y2="900"/>
    <line x1="360"  y1="0" x2="360"  y2="900"/>
    <line x1="480"  y1="0" x2="480"  y2="900"/>
    <line x1="600"  y1="0" x2="600"  y2="900"/>
    <line x1="720"  y1="0" x2="720"  y2="900"/>
    <line x1="840"  y1="0" x2="840"  y2="900"/>
    <line x1="960"  y1="0" x2="960"  y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1320" y1="0" x2="1320" y2="900"/>
  </g>

  <!-- Subtle grid lines - horizontal -->
  <g stroke="#0066cc" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="90"  x2="1440" y2="90"/>
    <line x1="0" y1="180" x2="1440" y2="180"/>
    <line x1="0" y1="270" x2="1440" y2="270"/>
    <line x1="0" y1="360" x2="1440" y2="360"/>
    <line x1="0" y1="450" x2="1440" y2="450"/>
    <line x1="0" y1="540" x2="1440" y2="540"/>
    <line x1="0" y1="630" x2="1440" y2="630"/>
    <line x1="0" y1="720" x2="1440" y2="720"/>
    <line x1="0" y1="810" x2="1440" y2="810"/>
  </g>

  <!-- Large background circles - decorative -->
  <circle cx="1300" cy="100"  r="300" fill="#00b4b4" opacity="0.03"/>
  <circle cx="100"  cy="800"  r="250" fill="#0066cc" opacity="0.03"/>
  <circle cx="720"  cy="450"  r="380" fill="#00b4b4" opacity="0.02"/>

  <!-- Medium accent circles - top right cluster -->
  <circle cx="1380" cy="60"   r="80"  fill="none" stroke="#00b4b4" stroke-width="1" opacity="0.08"/>
  <circle cx="1380" cy="60"   r="55"  fill="none" stroke="#00b4b4" stroke-width="0.8" opacity="0.06"/>
  <circle cx="1380" cy="60"   r="30"  fill="#00b4b4" opacity="0.04"/>

  <!-- Medium accent circles - bottom left cluster -->
  <circle cx="60"   cy="840"  r="70"  fill="none" stroke="#0066cc" stroke-width="1" opacity="0.07"/>
  <circle cx="60"   cy="840"  r="45"  fill="none" stroke="#0066cc" stroke-width="0.8" opacity="0.05"/>
  <circle cx="60"   cy="840"  r="22"  fill="#0066cc" opacity="0.03"/>

  <!-- Small dot accent grid (top area) -->
  <g fill="#00b4b4" opacity="0.12">
    <circle cx="200" cy="30"  r="2"/>
    <circle cx="230" cy="30"  r="2"/>
    <circle cx="260" cy="30"  r="2"/>
    <circle cx="290" cy="30"  r="2"/>
    <circle cx="200" cy="55"  r="2"/>
    <circle cx="230" cy="55"  r="2"/>
    <circle cx="260" cy="55"  r="2"/>
    <circle cx="290" cy="55"  r="2"/>
    <circle cx="200" cy="80"  r="2"/>
    <circle cx="230" cy="80"  r="2"/>
    <circle cx="260" cy="80"  r="2"/>
    <circle cx="290" cy="80"  r="2"/>
  </g>

  <!-- Small dot accent grid (bottom right) -->
  <g fill="#0066cc" opacity="0.1">
    <circle cx="1150" cy="820" r="2"/>
    <circle cx="1180" cy="820" r="2"/>
    <circle cx="1210" cy="820" r="2"/>
    <circle cx="1240" cy="820" r="2"/>
    <circle cx="1150" cy="845" r="2"/>
    <circle cx="1180" cy="845" r="2"/>
    <circle cx="1210" cy="845" r="2"/>
    <circle cx="1240" cy="845" r="2"/>
    <circle cx="1150" cy="870" r="2"/>
    <circle cx="1180" cy="870" r="2"/>
    <circle cx="1210" cy="870" r="2"/>
    <circle cx="1240" cy="870" r="2"/>
  </g>

  <!-- Diagonal accent lines (top left) -->
  <g stroke="#00b4b4" stroke-width="0.8" opacity="0.07" stroke-linecap="round">
    <line x1="0"   y1="120" x2="120" y2="0"/>
    <line x1="0"   y1="160" x2="160" y2="0"/>
    <line x1="0"   y1="200" x2="200" y2="0"/>
  </g>

  <!-- Diagonal accent lines (bottom right) -->
  <g stroke="#0066cc" stroke-width="0.8" opacity="0.06" stroke-linecap="round">
    <line x1="1320" y1="900" x2="1440" y2="780"/>
    <line x1="1280" y1="900" x2="1440" y2="740"/>
    <line x1="1240" y1="900" x2="1440" y2="700"/>
  </g>

  <!-- Subtle arc / wave (mid-page divider hint) -->
  <path d="M0,460 Q360,420 720,445 Q1080,470 1440,440"
        fill="none" stroke="#00b4b4" stroke-width="1" opacity="0.06"/>

  <!-- Very light hexagon outlines (geometric texture) -->
  <g fill="none" stroke="#00b4b4" stroke-width="0.7" opacity="0.05">
    <!-- hex centered at 1100,250 -->
    <polygon points="1100,214 1131,232 1131,268 1100,286 1069,268 1069,232"/>
    <!-- hex centered at 1140,286 -->
    <polygon points="1140,250 1171,268 1171,304 1140,322 1109,304 1109,268"/>
    <!-- hex centered at 1060,286 -->
    <polygon points="1060,250 1091,268 1091,304 1060,322 1029,304 1029,268"/>
  </g>

  <!-- Very light hexagon outlines (left side) -->
  <g fill="none" stroke="#0066cc" stroke-width="0.7" opacity="0.04">
    <polygon points="340,614 371,632 371,668 340,686 309,668 309,632"/>
    <polygon points="380,650 411,668 411,704 380,722 349,704 349,668"/>
    <polygon points="300,650 331,668 331,704 300,722 269,704 269,668"/>
  </g>
</svg>
