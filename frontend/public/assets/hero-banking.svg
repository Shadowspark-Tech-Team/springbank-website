<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Abstract fintech banking illustration">
  <title>Hero Banking Illustration</title>
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#e6f7f7;stop-opacity:1"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00b4b4;stop-opacity:1"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00b4b4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Background large circles (decorative) -->
  <circle cx="520" cy="-20" r="150" fill="#00b4b4" opacity="0.06"/>
  <circle cx="-30" cy="350" r="120" fill="#0066cc" opacity="0.05"/>
  <circle cx="300" cy="440" r="180" fill="#00b4b4" opacity="0.04"/>

  <!-- Network dots pattern (top-right region) -->
  <g opacity="0.4" stroke="#00b4b4" stroke-width="1" fill="#00b4b4">
    <!-- dots -->
    <circle cx="430" cy="40"  r="3"/>
    <circle cx="470" cy="60"  r="2.5"/>
    <circle cx="510" cy="45"  r="3"/>
    <circle cx="550" cy="70"  r="2"/>
    <circle cx="450" cy="85"  r="2"/>
    <circle cx="490" cy="100" r="3"/>
    <circle cx="530" cy="90"  r="2.5"/>
    <circle cx="570" cy="110" r="2"/>
    <circle cx="410" cy="110" r="2"/>
    <!-- connecting lines -->
    <line x1="430" y1="40"  x2="470" y2="60"  stroke-width="0.8" opacity="0.6"/>
    <line x1="470" y1="60"  x2="510" y2="45"  stroke-width="0.8" opacity="0.6"/>
    <line x1="510" y1="45"  x2="550" y2="70"  stroke-width="0.8" opacity="0.6"/>
    <line x1="470" y1="60"  x2="450" y2="85"  stroke-width="0.8" opacity="0.6"/>
    <line x1="450" y1="85"  x2="490" y2="100" stroke-width="0.8" opacity="0.6"/>
    <line x1="490" y1="100" x2="530" y2="90"  stroke-width="0.8" opacity="0.6"/>
    <line x1="530" y1="90"  x2="570" y2="110" stroke-width="0.8" opacity="0.6"/>
    <line x1="510" y1="45"  x2="490" y2="100" stroke-width="0.8" opacity="0.4"/>
    <line x1="410" y1="110" x2="450" y2="85"  stroke-width="0.8" opacity="0.6"/>
  </g>

  <!-- Network dots (bottom-left) -->
  <g opacity="0.3" stroke="#0066cc" stroke-width="1" fill="#0066cc">
    <circle cx="30"  cy="280" r="2.5"/>
    <circle cx="70"  cy="300" r="2"/>
    <circle cx="50"  cy="330" r="3"/>
    <circle cx="90"  cy="350" r="2.5"/>
    <circle cx="20"  cy="355" r="2"/>
    <line x1="30"  y1="280" x2="70"  y2="300" stroke-width="0.8" opacity="0.6"/>
    <line x1="70"  y1="300" x2="50"  y2="330" stroke-width="0.8" opacity="0.6"/>
    <line x1="50"  y1="330" x2="90"  y2="350" stroke-width="0.8" opacity="0.6"/>
    <line x1="50"  y1="330" x2="20"  y2="355" stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="280" x2="50"  y2="330" stroke-width="0.8" opacity="0.4"/>
  </g>

  <!-- Abstract bar chart (background, left side) -->
  <g opacity="0.12" fill="#0066cc">
    <rect x="60"  y="200" width="22" height="80"/>
    <rect x="90"  y="170" width="22" height="110"/>
    <rect x="120" y="185" width="22" height="95"/>
    <rect x="150" y="145" width="22" height="135"/>
    <rect x="180" y="160" width="22" height="120"/>
  </g>
  <!-- Chart line overlay -->
  <polyline points="71,200 101,170 131,185 161,145 191,160"
            fill="none" stroke="#0066cc" stroke-width="2" opacity="0.18"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Main credit card -->
  <g filter="url(#shadow)" transform="translate(60,110)">
    <rect width="280" height="170" rx="16" fill="url(#cardGrad)"/>
    <!-- Card shine -->
    <ellipse cx="60" cy="30" rx="80" ry="40" fill="white" opacity="0.08" transform="rotate(-15,60,30)"/>
    <!-- Chip -->
    <rect x="28" y="52" width="42" height="32" rx="5" fill="#f0d060" opacity="0.9"/>
    <line x1="28" y1="62" x2="70" y2="62" stroke="#c8a820" stroke-width="1" opacity="0.7"/>
    <line x1="28" y1="72" x2="70" y2="72" stroke="#c8a820" stroke-width="1" opacity="0.7"/>
    <line x1="49" y1="52" x2="49" y2="84" stroke="#c8a820" stroke-width="1" opacity="0.7"/>
    <!-- Contactless waves -->
    <path d="M88,58 Q96,68 88,78" stroke="white" stroke-width="1.8" fill="none" opacity="0.7" stroke-linecap="round"/>
    <path d="M96,52 Q108,68 96,84" stroke="white" stroke-width="1.8" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M104,46 Q120,68 104,90" stroke="white" stroke-width="1.8" fill="none" opacity="0.3" stroke-linecap="round"/>
    <!-- Card number dots -->
    <circle cx="28"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="38"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="48"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="58"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="78"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="88"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="98"  cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="108" cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="128" cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="138" cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="148" cy="120" r="3.5" fill="white" opacity="0.7"/>
    <circle cx="158" cy="120" r="3.5" fill="white" opacity="0.7"/>
    <!-- Last 4 visible digits -->
    <text x="178" y="126" font-family="'Courier New',monospace" font-size="14"
          font-weight="600" fill="white" opacity="0.9" letter-spacing="2">4521</text>
    <!-- Card label -->
    <text x="28"  y="154" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="11" fill="white" opacity="0.75" letter-spacing="1">SPRINGBANK</text>
    <text x="220" y="154" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="10" fill="white" opacity="0.7">VISA</text>
  </g>

  <!-- Floating stat panel (right side) -->
  <g filter="url(#shadow)" transform="translate(380,90)">
    <rect width="185" height="90" rx="12" fill="white" opacity="0.92"/>
    <rect x="14" y="16" width="6" height="36" rx="3" fill="#00b4b4"/>
    <text x="28" y="30" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="10" fill="#6b7c93">Portfolio Value</text>
    <text x="28" y="50" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="20" font-weight="700" fill="#1a2332">$47,650</text>
    <text x="28" y="66" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="10" fill="#00b4b4">▲ 3.2% this month</text>
    <!-- Mini sparkline -->
    <polyline points="14,90 35,78 60,82 85,65 110,70 135,55 160,48 185,52"
              fill="none" stroke="#00b4b4" stroke-width="2" opacity="0.5"
              stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Floating small panel (right lower) -->
  <g filter="url(#shadow)" transform="translate(400,210)">
    <rect width="160" height="72" rx="12" fill="white" opacity="0.9"/>
    <circle cx="28" cy="28" r="14" fill="#e6f7f7"/>
    <!-- Up arrow icon -->
    <polyline points="28,34 28,22" stroke="#00b4b4" stroke-width="2"
              stroke-linecap="round" fill="none"/>
    <polyline points="23,27 28,22 33,27" stroke="#00b4b4" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="50" y="24" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="10" fill="#6b7c93">Last Transfer</text>
    <text x="50" y="40" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="15" font-weight="700" fill="#1a2332">$1,250.00</text>
    <text x="50" y="56" font-family="'Segoe UI',Helvetica,sans-serif"
          font-size="9" fill="#00b4b4">Completed ✓</text>
  </g>

  <!-- Subtle horizontal rule lines (data feel) -->
  <line x1="60" y1="320" x2="240" y2="320" stroke="#00b4b4" stroke-width="0.8" opacity="0.2"/>
  <line x1="60" y1="335" x2="180" y2="335" stroke="#0066cc" stroke-width="0.8" opacity="0.15"/>
  <line x1="60" y1="350" x2="210" y2="350" stroke="#00b4b4" stroke-width="0.8" opacity="0.1"/>

  <!-- Small ring / donut hint (bottom right) -->
  <circle cx="555" cy="340" r="42" fill="none" stroke="#00b4b4" stroke-width="10" opacity="0.08"/>
  <circle cx="555" cy="340" r="42" fill="none" stroke="#0066cc" stroke-width="10"
          stroke-dasharray="90 174" stroke-dashoffset="0" opacity="0.12"
          transform="rotate(-90 555 340)"/>
</svg>
