<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" role="img" aria-label="SpringBank">
  <title>SpringBank</title>
  <!-- Leaf/spring icon -->
  <g transform="translate(4,7)">
    <!-- Outer leaf -->
    <path d="M18,2 C18,2 30,4 30,18 C30,28 22,34 14,35 C14,35 14,22 18,14 C20,10 22,6 18,2 Z"
          fill="#00b4b4" opacity="0.9"/>
    <!-- Inner leaf highlight -->
    <path d="M18,6 C18,6 26,8 26,18 C26,25 21,30 16,32 C16,32 15,22 18,15 C19.5,11 21,8 18,6 Z"
          fill="#00d4d4" opacity="0.5"/>
    <!-- Stem -->
    <path d="M14,35 C10,28 8,18 14,10" stroke="#007a7a" stroke-width="1.5" fill="none"
          stroke-linecap="round"/>
    <!-- Small curl at base -->
    <path d="M14,35 C12,36 10,35 10,33" stroke="#007a7a" stroke-width="1.2" fill="none"
          stroke-linecap="round"/>
  </g>
  <!-- SpringBank wordmark -->
  <text x="44" y="32" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="18" font-weight="700" fill="#1a2332" letter-spacing="-0.3">
    Spring<tspan fill="#00b4b4">Bank</tspan>
  </text>
</svg>
